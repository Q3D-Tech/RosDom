services:
  postgres:
    image: postgres:16-alpine
    container_name: rosdom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rosdom
      POSTGRES_USER: rosdom
      POSTGRES_PASSWORD: rosdom
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rosdom -d rosdom"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rosdom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
